<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="ctop" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6BDD78"/><stop offset="1" stop-color="#4CC661"/></linearGradient>
    <linearGradient id="cleft" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#46C95B"/><stop offset="1" stop-color="#2F9E46"/></linearGradient>
    <linearGradient id="cright" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2E9440"/><stop offset="1" stop-color="#1C6B2E"/></linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.10" r="0.6">
      <stop offset="0" stop-color="#3fb950" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#3fb950" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#3fb950" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- inner frame -->
  <rect x="24" y="24" width="1152" height="582" rx="18" fill="none" stroke="#1f1f2e" stroke-width="1.5"/>

  <!-- terminal dots (echo del panel del hero) -->
  <circle cx="1088" cy="62" r="6" fill="#ff5f56"/>
  <circle cx="1112" cy="62" r="6" fill="#ffbd2e"/>
  <circle cx="1136" cy="62" r="6" fill="#27c93f"/>

  <!-- logo + wordmark lockup -->
  <g transform="translate(64,46) scale(0.80)">
    <path d="M44 4 L80 22 L44 40 L8 22 Z" fill="url(#ctop)"/>
    <path d="M8 22 L44 40 L44 84 L8 66 Z" fill="url(#cleft)"/>
    <path d="M44 40 L80 22 L80 66 L44 84 Z" fill="url(#cright)"/>
    <g fill="#0a0a0f">
      <path d="M34 37 L40 40 L40 78 L34 75 Z"/>
      <path d="M16 42 L34 51 L34 57 L16 48 Z"/>
      <path d="M16 48 L22 51 L22 63 L16 60 Z"/>
      <path d="M16 60 L34 69 L34 75 L16 66 Z"/>
    </g>
  </g>
  <text x="150" y="106" font-family="JetBrainsMono Nerd Font Mono" font-weight="700" font-size="46" fill="#f1f1f4">dishape<tspan fill="#3fb950">.</tspan></text>

  <!-- headline -->
  <text x="66" y="318" font-family="JetBrainsMono Nerd Font Mono" font-weight="700" font-size="92" fill="#f1f1f4">Your website,</text>
  <text x="66" y="430" xml:space="preserve" font-family="JetBrainsMono Nerd Font Mono" font-weight="700" font-size="92"><tspan fill="#f1f1f4">from </tspan><tspan fill="#56d364">one person.</tspan></text>
  <!-- caret cursor -->
  <rect x="959" y="368" width="40" height="62" rx="2" fill="#3fb950" fill-opacity="0.85"/>

  <!-- subtitle -->
  <text x="68" y="498" font-family="JetBrainsMono Nerd Font Mono" font-weight="400" font-size="27" fill="#a1a1b5">One person, no agencies, no middlemen</text>

  <!-- footer prompt -->
  <text x="66" y="566" xml:space="preserve" font-family="JetBrainsMono Nerd Font Mono" font-weight="700" font-size="30"><tspan fill="#3fb950">&gt; </tspan><tspan fill="#f1f1f4">dishape.dev</tspan></text>
  <text x="1136" y="566" text-anchor="end" font-family="JetBrainsMono Nerd Font Mono" font-weight="400" font-size="24" fill="#6b6b80">design · infra · AI · analytics</text>
</svg>
